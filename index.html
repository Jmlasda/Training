<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Train & Eat">
<meta name="theme-color" content="#0a0a0a">
<title>Train & Eat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;
  --surface:#141414;
  --border:#2a2a2a;
  --text:#f0f0f0;
  --muted:#666;
  --green:#c8f135;
  --warm:#f5c842;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden}
.wrap{
  height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:calc(var(--safe-top) + 24px) 24px calc(var(--safe-bot) + 24px);
  gap:0;
}
.greeting{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;text-align:center}
.logo{font-size:42px;font-weight:800;letter-spacing:-1.5px;text-align:center;line-height:1;margin-bottom:6px}
.logo span{color:var(--green)}
.tagline{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);text-align:center;margin-bottom:48px}

.cards{width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px}
.card{
  display:block;
  text-decoration:none;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:24px 24px 22px;
  transition:transform 0.15s, border-color 0.15s;
  position:relative;
  overflow:hidden;
}
.card:active{transform:scale(0.97)}
.card.train{border-color:#2a3a1a}
.card.train:active{border-color:#4a6a2a}
.card.eat{border-color:#3a3010}
.card.eat:active{border-color:#6a5a20}

.card-accent{position:absolute;top:0;right:0;width:120px;height:120px;border-radius:50%;opacity:0.06;transform:translate(30px,-30px)}
.card.train .card-accent{background:var(--green)}
.card.eat .card-accent{background:var(--warm)}

.card-icon{font-size:28px;margin-bottom:14px;line-height:1}
.card-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.card.train .card-label{color:var(--green)}
.card.eat .card-label{color:var(--warm)}
.card-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;color:var(--text);margin-bottom:6px}
.card-desc{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6}
.card-arrow{position:absolute;bottom:22px;right:22px;font-size:20px;opacity:0.3}
.card.train .card-arrow{color:var(--green)}
.card.eat .card-arrow{color:var(--warm)}

.stats-row{width:100%;max-width:360px;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.stat-val{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.stat-val.g{color:var(--green)}
.stat-val.w{color:var(--warm)}
.stat-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px}

.footer{font-family:'DM Mono',monospace;font-size:10px;color:#333;text-align:center;margin-top:28px}
</style>
</head>
<body>
<div class="wrap">
  <div class="greeting" id="greeting"></div>
  <div class="logo">TRAIN<span>&</span>EAT</div>
  <div class="tagline" id="tagline"></div>

  <div class="cards">
    <a class="card train" href="workout-tracker.html">
      <div class="card-accent"></div>
      <div class="card-icon">🏋️</div>
      <div class="card-label">Workout</div>
      <div class="card-title">Train</div>
      <div class="card-desc">4-week hypertrophy plan · log sets · track weights · progressive overload</div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card eat" href="meal-plan.html">
      <div class="card-accent"></div>
      <div class="card-icon">🥗</div>
      <div class="card-label">Nutrition</div>
      <div class="card-title">Eat</div>
      <div class="card-desc">Weekly meal plan · ~1,950 cal · 130g+ protein · shopping list · meal prep guide</div>
      <div class="card-arrow">→</div>
    </a>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-val g" id="statWorkouts">—</div><div class="stat-label">workouts logged</div></div>
    <div class="stat"><div class="stat-val w">1,950</div><div class="stat-label">daily cal target</div></div>
  </div>

  <div class="footer">jessica · family of 5 · oneida ny</div>
</div>

<script>
const hour = new Date().getHours();
const greetings = hour < 12 ? ['Good morning','Time to train'] : hour < 17 ? ['Good afternoon','Stay on track'] : ['Good evening','Rest and recover'];
document.getElementById('greeting').textContent = greetings[0] + ', Jessica';

const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const dayName = days[new Date().getDay()];
const focuses = {Monday:'Push day',Tuesday:'HIIT cardio',Wednesday:'Pull day',Thursday:'Yoga',Friday:'Leg day',Saturday:'Zone 2 walk',Sunday:'Rest day'};
document.getElementById('tagline').textContent = dayName + ' · ' + (focuses[dayName] || 'Rest day');

const saved = JSON.parse(localStorage.getItem('train_state') || '{}');
const completed = saved.completed || {};
const count = Object.values(completed).filter(Boolean).length;
document.getElementById('statWorkouts').textContent = count || '0';
</script>
</body>
</html>
